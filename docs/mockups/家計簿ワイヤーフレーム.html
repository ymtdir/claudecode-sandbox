<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>家計簿 — ワイヤーフレーム探索</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;600;700&family=Architects+Daughter&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: #f0eee9; }
    * { box-sizing: border-box; }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="wireframe-kit.jsx"></script>
  <script type="text/babel" src="sf-symbols.jsx"></script>
  <script type="text/babel" src="wf-spec-screens.jsx"></script>
  <script type="text/babel" src="wf-spec-screens-dark.jsx"></script>

  <script type="text/babel">
    function App() {
      return (
        <DesignCanvas>
            <DCSection id="spec" title="家計簿 — 基本設計書 準拠案（ライト）" subtitle="入力 / カレンダー / レポート / 予算 / 設定。S-01〜S-05 の5タブ構成">
              <DCArtboard id="s01" label="S-01 · 入力タブ" width={280} height={580}>
                <S01_Input />
              </DCArtboard>
              <DCArtboard id="s02" label="S-02 · カレンダー（上下分割）" width={280} height={580}>
                <S02_Calendar />
              </DCArtboard>
              <DCArtboard id="s03" label="S-03 · レポート" width={280} height={580}>
                <S03_Report />
              </DCArtboard>
              <DCArtboard id="s04" label="S-04 · 予算" width={280} height={580}>
                <S04_Budget />
              </DCArtboard>
              <DCArtboard id="s05" label="S-05 · 設定" width={280} height={580}>
                <S05_Settings />
              </DCArtboard>
            </DCSection>

            <DCSection id="spec-dark" title="家計簿 — 基本設計書 準拠案（ダーク）" subtitle="iOS標準ダークパレット（true black + secondary fill）">
              <DCArtboard id="s01d" label="S-01 · 入力タブ（Dark）" width={280} height={580}>
                <S01_InputDark />
              </DCArtboard>
              <DCArtboard id="s02d" label="S-02 · カレンダー（Dark）" width={280} height={580}>
                <S02_CalendarDark />
              </DCArtboard>
              <DCArtboard id="s03d" label="S-03 · レポート（Dark）" width={280} height={580}>
                <S03_ReportDark />
              </DCArtboard>
              <DCArtboard id="s04d" label="S-04 · 予算（Dark）" width={280} height={580}>
                <S04_BudgetDark />
              </DCArtboard>
              <DCArtboard id="s05d" label="S-05 · 設定（Dark）" width={280} height={580}>
                <S05_SettingsDark />
              </DCArtboard>
            </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
